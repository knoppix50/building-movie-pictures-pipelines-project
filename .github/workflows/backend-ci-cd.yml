name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths: [ 'starter/backend/**' ] # Solo si cambia el backend
  pull_request:
    branches: [ main ]
    paths: [ 'starter/backend/**' ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: backend # Confirma este nombre con tu salida de Terraform
  EKS_CLUSTER: cluster

jobs:
  # --- PASO 1: INTEGRACIÓN CONTINUA (CI) ---
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Pipenv y dependencias
        run: |
          pip install pipenv
          pipenv install --dev

      - name: Ejecutar Linter
        run: pipenv run lint

      - name: Ejecutar Pruebas
        run: pipenv run test

  # --- PASO 2: DESPLIEGUE CONTINUO (CD) ---
  build-and-deploy:
    needs: lint-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y Subir Imagen Docker a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd starter/backend
          docker build --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Desplegar en Kubernetes (EKS)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          cd starter/backend/k8s
          kustomize edit set image backend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          kustomize build . | kubectl apply -f -


name: Frontend Continuous Integration

on:
  pull_request:
    branches: [ main ]
    paths: [ 'starter/frontend/**' ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar Linter (Análisis Estático)
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Ejecutar Pruebas Unitarias
        run: CI=true npm test

  build:
    needs: [lint, test] # <-- Mandatory by rubric: wait until linter and parallel test finish.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Simulación de construcción Docker para CI
        run: echo "El frontend compila correctamente en Docker"


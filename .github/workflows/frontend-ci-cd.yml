name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths: [ 'starter/frontend/**' ] # Solo si cambia el frontend
  pull_request:
    branches: [ main ]
    paths: [ 'starter/frontend/**' ]
  workflow_dispatch: # Permite ejecutarlo manualmente

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend # Confirma este nombre con tu salida de Terraform
  EKS_CLUSTER: cluster
  REACT_APP_MOVIE_API_URL: http://localhost:5000

jobs:
  # --- PASO 1: INTEGRACIÓN CONTINUA (CI) ---
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/frontend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: starter/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Linter (Análisis Estático)
        run: npm run lint

      - name: Ejecutar Pruebas Unitarias
        run: CI=true npm test

  # --- PASO 2: DESPLIEGUE CONTINUO (CD) ---
  build-and-deploy:
    needs: lint-and-test
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y Subir Imagen Docker a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd starter/frontend
          docker build \
            --build-arg REACT_APP_MOVIE_API_URL=${{ env.REACT_APP_MOVIE_API_URL }} \
            --tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Desplegar en Kubernetes (EKS)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
          cd starter/frontend/k8s
          kustomize edit set image frontend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          kustomize build . | kubectl apply -f -


name: Master Workflow

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  job-backend-ci:
    uses: ./.github/workflows/backend-ci.yaml@main
    secrets: inherit

  
  job-backend-cd:
    needs: job-backend-ci
    uses: ./.github/workflows/backend-cd.yaml@main
    secrets: inherit

  
  job-frontend-ci:
    needs: job-backend-cd
    uses: ./.github/workflows/frontend-ci.yaml@main
    secrets: inherit

  
  job-frontend-cd:
    needs: job-frontend-ci
    uses: ./.github/workflows/frontend-cd.yaml@main
    secrets: inherit


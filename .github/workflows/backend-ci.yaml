name: Backend Continuous Integration

on:
  workflow_call:
  pull_request:
    branches: [ main ]
    paths: [ 'starter/backend/**' ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Setup runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pipenv'
      - name: Install package dependencies
        run: |
          pip install pipenv
          pipenv install --dev
      - name: Execute static code analysis (Linting)
        run: pipenv run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter/backend
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Setup runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pipenv'
      - name: Install package dependencies
        run: |
          pip install pipenv
          pipenv install --dev
      - name: Run automated unit tests
        run: pipenv run test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Validate Docker image build.
        run: | 
          cd starter/backend
          docker build -t backend-test .
          echo "The code compiles correctly in Docker."

